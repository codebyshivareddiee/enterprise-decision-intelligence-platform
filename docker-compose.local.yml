# ──────────────────────────────────────────────────────────────────────────────
# docker-compose.local.yml — Local databases override
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# This file adds local instances of MongoDB and Qdrant for developers who 
# prefer to run the entire stack locally without depending on cloud services.
# ──────────────────────────────────────────────────────────────────────────────
version: "3.9"

services:
  # ── Backend Override ───────────────────────────────────────────────────────
  backend:
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    # Remember to update .env to point to these local instances:
    # MONGODB_URI=mongodb://mongodb:27017
    # QDRANT_URL=http://qdrant:6333

  # ── Local Databases ────────────────────────────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: edip_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - edip_net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: edip_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - edip_net

volumes:
  mongodb_data:
  qdrant_data:
