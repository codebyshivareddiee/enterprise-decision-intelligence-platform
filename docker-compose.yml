# ──────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Local development stack
#
# Services:
#   backend  — FastAPI application (hot-reload)
#
# External services (MongoDB Atlas, Qdrant Cloud) are configured via .env.
# No local database containers are included — the platform uses cloud services.
# ──────────────────────────────────────────────────────────────────────────────
version: "3.9"

services:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.dev
    container_name: edip_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app        # hot-reload source
      - ./backend/tests:/app/tests
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - edip_net

networks:
  edip_net:
    driver: bridge
