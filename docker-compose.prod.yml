# ──────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml — Production stack
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# This file defines the production configuration, using the multi-stage 
# production Dockerfile for the backend. It relies on cloud services 
# for MongoDB and Qdrant via .env.
# ──────────────────────────────────────────────────────────────────────────────
version: "3.9"

services:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edip_backend_prod
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    # No volume mounts for source code in production
    networks:
      - edip_net

networks:
  edip_net:
    driver: bridge
